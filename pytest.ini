[pytest]
# 测试路径配置
testpaths =
    tests
    scripts

# 测试文件匹配模式
python_files =
    test_*.py
    *_test.py
    audit_*.py
    verify_*.py
    validate_*.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 排除的目录和文件
norecursedirs =
    .venv
    venv
    env
    .git
    __pycache__
    .pytest_cache
    node_modules
    build
    dist
    *.egg-info
    payload
    pgdata
    pgsql18
    backups
    logs
    vendor
    .claude

# 输出配置
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 标记配置
markers =
    slow: 标记运行缓慢的测试
    integration: 标记集成测试
    unit: 标记单元测试
    audit: 标记审计脚本
    manual: 标记需要人工干预的测试

# 最小 Python 版本
minversion = 6.0

# 控制台输出编码
console_output_style = progress
