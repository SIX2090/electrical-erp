{% extends "base.html" %}

{% block title %}系统通知{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <i class="bi bi-bell"></i> 系统通知
                        <span id="unreadBadge" class="badge bg-danger ms-2" style="display:none;">0</span>
                    </h5>
                    <div>
                        <button id="btnMarkAllRead" class="btn btn-sm btn-primary me-2">
                            <i class="bi bi-check-all"></i> 全部已读
                        </button>
                        <button id="btnRefresh" class="btn btn-sm btn-secondary">
                            <i class="bi bi-arrow-clockwise"></i> 刷新
                        </button>
                        <a href="/" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-house"></i> 返回首页
                        </a>
                    </div>
                </div>
                <div class="card-body">
                    <!-- 筛选器 -->
                    <div class="mb-3">
                        <div class="btn-group" role="group">
                            <input type="radio" class="btn-check" name="filterType" id="filterAll" value="all" checked>
                            <label class="btn btn-outline-primary" for="filterAll">全部</label>

                            <input type="radio" class="btn-check" name="filterType" id="filterUnread" value="unread">
                            <label class="btn btn-outline-primary" for="filterUnread">未读</label>
                        </div>

                        <div class="btn-group ms-3" role="group">
                            <input type="radio" class="btn-check" name="categoryFilter" id="catAll" value="" checked>
                            <label class="btn btn-outline-secondary" for="catAll">所有分类</label>

                            <input type="radio" class="btn-check" name="categoryFilter" id="catSecurity" value="security">
                            <label class="btn btn-outline-secondary" for="catSecurity">安全</label>

                            <input type="radio" class="btn-check" name="categoryFilter" id="catBackup" value="backup">
                            <label class="btn btn-outline-secondary" for="catBackup">备份</label>

                            <input type="radio" class="btn-check" name="categoryFilter" id="catSystem" value="system">
                            <label class="btn btn-outline-secondary" for="catSystem">系统</label>

                            <input type="radio" class="btn-check" name="categoryFilter" id="catWarning" value="warning">
                            <label class="btn btn-outline-secondary" for="catWarning">警告</label>
                        </div>
                    </div>

                    <!-- 通知列表 -->
                    <div id="notificationList">
                        <div class="text-center text-muted py-5">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                            <p class="mt-2">加载通知...</p>
                        </div>
                    </div>

                    <!-- 分页 -->
                    <nav id="paginationNav" class="mt-3" style="display:none;">
                        <ul class="pagination justify-content-center">
                            <!-- 分页按钮由 JS 生成 -->
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let currentPage = 1;
let pageSize = 20;
let currentFilter = 'all';
let currentCategory = '';

// 页面加载时
$(document).ready(function() {
    loadNotifications();
    updateUnreadCount();

    // 定时刷新未读数量（每30秒）
    setInterval(updateUnreadCount, 30000);
});

// 加载通知列表
function loadNotifications() {
    const unreadOnly = currentFilter === 'unread';
    const offset = (currentPage - 1) * pageSize;

    $.ajax({
        url: '/notifications/api/list',
        method: 'GET',
        data: {
            limit: pageSize,
            offset: offset,
            unread_only: unreadOnly
        },
        success: function(response) {
            if (response.status === 'success') {
                renderNotifications(response.notifications);
            } else {
                showError(response.msg || '加载失败');
            }
        },
        error: function() {
            showError('网络错误，加载失败');
        }
    });
}

// 渲染通知列表
function renderNotifications(notifications) {
    const container = $('#notificationList');

    if (!notifications || notifications.length === 0) {
        container.html(`
            <div class="text-center text-muted py-5">
                <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                <p class="mt-2">暂无通知</p>
            </div>
        `);
        return;
    }

    // 按分类筛选
    let filtered = notifications;
    if (currentCategory) {
        filtered = notifications.filter(n => n.category === currentCategory);
    }

    let html = '<div class="list-group">';

    filtered.forEach(n => {
        const isUnread = !n.is_read;
        const severityClass = getSeverityClass(n.severity);
        const categoryLabel = getCategoryLabel(n.category);
        const categoryClass = getCategoryClass(n.category);

        html += `
            <div class="list-group-item ${isUnread ? 'list-group-item-light border-start border-primary border-3' : ''}"
                 data-id="${n.id}" data-read="${n.is_read}">
                <div class="d-flex w-100 justify-content-between align-items-start">
                    <div class="flex-grow-1">
                        <div class="d-flex align-items-center mb-1">
                            <h6 class="mb-0 me-2">
                                ${isUnread ? '<i class="bi bi-circle-fill text-primary" style="font-size:0.5rem;"></i> ' : ''}
                                ${n.title}
                            </h6>
                            <span class="badge ${categoryClass} me-2">${categoryLabel}</span>
                            <span class="badge ${severityClass}">${getSeverityLabel(n.severity)}</span>
                        </div>
                        ${n.message ? `<p class="mb-1 text-muted">${n.message}</p>` : ''}
                        <small class="text-muted">
                            <i class="bi bi-clock"></i> ${n.created_at}
                        </small>
                    </div>
                    <div class="d-flex flex-column align-items-end ms-3">
                        ${n.action_url ? `
                            <a href="${n.action_url}" class="btn btn-sm btn-outline-primary mb-2">
                                <i class="bi bi-box-arrow-up-right"></i> 查看
                            </a>
                        ` : ''}
                        ${isUnread ? `
                            <button class="btn btn-sm btn-outline-secondary mb-2" onclick="markAsRead(${n.id})">
                                <i class="bi bi-check"></i> 已读
                            </button>
                        ` : ''}
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteNotification(${n.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
    });

    html += '</div>';
    container.html(html);
}

// 获取严重级别样式类
function getSeverityClass(severity) {
    const map = {
        'info': 'bg-info',
        'warning': 'bg-warning',
        'error': 'bg-danger',
        'critical': 'bg-dark'
    };
    return map[severity] || 'bg-secondary';
}

// 获取严重级别标签
function getSeverityLabel(severity) {
    const map = {
        'info': '信息',
        'warning': '警告',
        'error': '错误',
        'critical': '严重'
    };
    return map[severity] || severity;
}

// 获取分类标签
function getCategoryLabel(category) {
    const map = {
        'security': '安全',
        'backup': '备份',
        'system': '系统',
        'warning': '警告',
        'info': '信息'
    };
    return map[category] || category;
}

// 获取分类样式类
function getCategoryClass(category) {
    const map = {
        'security': 'bg-danger',
        'backup': 'bg-primary',
        'system': 'bg-secondary',
        'warning': 'bg-warning',
        'info': 'bg-info'
    };
    return map[category] || 'bg-secondary';
}

// 更新未读数量
function updateUnreadCount() {
    $.ajax({
        url: '/notifications/api/unread-count',
        method: 'GET',
        success: function(response) {
            if (response.status === 'success') {
                const count = response.unread_count;
                const badge = $('#unreadBadge');
                if (count > 0) {
                    badge.text(count).show();
                } else {
                    badge.hide();
                }

                // 更新顶部导航栏的未读数量（如果存在）
                if (typeof updateNavUnreadCount === 'function') {
                    updateNavUnreadCount(count);
                }
            }
        }
    });
}

// 标记为已读
function markAsRead(notificationId) {
    $.ajax({
        url: `/notifications/api/${notificationId}/read`,
        method: 'POST',
        success: function(response) {
            if (response.status === 'success') {
                loadNotifications();
                updateUnreadCount();
            } else {
                showError(response.msg || '操作失败');
            }
        },
        error: function() {
            showError('网络错误');
        }
    });
}

// 全部已读
$('#btnMarkAllRead').click(function() {
    if (!confirm('确定将所有未读通知标记为已读？')) {
        return;
    }

    $.ajax({
        url: '/notifications/api/read-all',
        method: 'POST',
        success: function(response) {
            if (response.status === 'success') {
                showSuccess('所有通知已标记为已读');
                loadNotifications();
                updateUnreadCount();
            } else {
                showError(response.msg || '操作失败');
            }
        },
        error: function() {
            showError('网络错误');
        }
    });
});

// 删除通知
function deleteNotification(notificationId) {
    if (!confirm('确定删除此通知？')) {
        return;
    }

    $.ajax({
        url: `/notifications/api/${notificationId}`,
        method: 'DELETE',
        success: function(response) {
            if (response.status === 'success') {
                showSuccess('通知已删除');
                loadNotifications();
                updateUnreadCount();
            } else {
                showError(response.msg || '操作失败');
            }
        },
        error: function() {
            showError('网络错误');
        }
    });
}

// 刷新
$('#btnRefresh').click(function() {
    loadNotifications();
    updateUnreadCount();
});

// 筛选器变更
$('input[name="filterType"]').change(function() {
    currentFilter = $(this).val();
    currentPage = 1;
    loadNotifications();
});

$('input[name="categoryFilter"]').change(function() {
    currentCategory = $(this).val();
    loadNotifications();
});

// 提示函数
function showSuccess(msg) {
    alert(msg);
}

function showError(msg) {
    alert('错误: ' + msg);
}
</script>
{% endblock %}
