{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="mb-3">
    <a class="btn btn-outline-secondary btn-sm" href="{{ list_url }}">返回</a>
</div>

<div class="page-heading">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
</div>

<form method="post" action="{{ action_url }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="page-card order-form-card mb-3">
        <div class="section-title">
            <div>
                <h2>期初信息</h2>
                <span>{{ owner_label }}、期初日期、余额、到期日、项目号和柜号。</span>
            </div>
        </div>
        <div class="row g-3">
            <div class="col-md-6 col-xl-3">
                <label class="form-label">单据编号</label>
                <input class="form-control" type="text" value="" placeholder="保存时自动生成" readonly>
            </div>
            <div class="col-md-6 col-xl-3">
                <label class="form-label">{{ owner_label }} <span class="text-danger">*</span></label>
                <select class="form-select" name="partner_id" required>
                    <option value="">请选择{{ owner_label }}</option>
                    {% for row in partners %}
                    <option value="{{ row.id }}">{{ row.name|clean_text }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 col-xl-3">
                <label class="form-label">期初日期</label>
                <input class="form-control" type="date" name="opening_date" value="{{ today().isoformat() }}">
            </div>
            <div class="col-md-6 col-xl-3">
                <label class="form-label">原始单号/对账单号</label>
                <input class="form-control" name="source_no" placeholder="可填上线前单据号">
            </div>
            <div class="col-md-6 col-xl-3">
                <label class="form-label">到期日</label>
                <input class="form-control" type="date" name="due_date">
            </div>
            <div class="col-md-6 col-xl-3">
                <label class="form-label">{{ amount_label }} <span class="text-danger">*</span></label>
                <input class="form-control text-end" type="number" min="0.01" step="0.01" name="amount" required>
            </div>
            <div class="col-md-6 col-xl-3">
                <label class="form-label">{{ settled_label }}</label>
                <input class="form-control text-end" type="number" min="0" step="0.01" name="settled_amount" value="0">
            </div>
            <div class="col-md-6 col-xl-3">
                <label class="form-label">项目号 <span class="text-muted small">建议</span></label>
                <input class="form-control" name="project_code">
            </div>
            <div class="col-md-6 col-xl-3">
                <label class="form-label">柜号 <span class="text-muted small">建议</span></label>
                <input class="form-control" name="cabinet_no">
            </div>
            <div class="col-12">
                <label class="form-label">备注</label>
                <input class="form-control" name="remark" placeholder="{{ remark_placeholder }}">
            </div>
        </div>
    </div>
    <div class="d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{{ list_url }}">取消</a>
        <button class="btn btn-primary" type="submit"><i class="bi bi-check2"></i> 保存{{ title }}</button>
    </div>
</form>
{% endblock %}
